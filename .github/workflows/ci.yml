name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - name: Build
        working-directory: rust
        run: cargo build
      - name: Test
        working-directory: rust
        run: cargo test
      - name: Build release
        working-directory: rust
        run: cargo build --release
      - name: Smoke test
        working-directory: rust
        run: |
          # Verify binary runs and shows help
          ./target/release/xg --help | grep -q "Ultra-fast indexed code search"
          # Verify search works (search xgrep's own source)
          ./target/release/xg "fn main" --type rs | grep -q "fn main"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - name: Clippy
        working-directory: rust
        run: cargo clippy -- -D warnings
      - name: Format check
        working-directory: rust
        run: cargo fmt -- --check

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for unsafe code count
        working-directory: rust
        run: |
          UNSAFE_COUNT=$(grep -rn "unsafe" src/ --include="*.rs" | grep -v "SAFETY" | grep -v "#\[cfg" | grep -v "test" | grep -v "mod tests" | wc -l | tr -d ' ')
          echo "Unsafe blocks (excluding tests and SAFETY-commented): $UNSAFE_COUNT"
          if [ "$UNSAFE_COUNT" -gt 25 ]; then
            echo "WARNING: High number of unsafe blocks ($UNSAFE_COUNT). Review needed."
            exit 1
          fi

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # 1.85.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - name: Check MSRV
        working-directory: rust
        run: cargo check

  release:
    name: Release build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, lint, security, msrv]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: xg-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: xg-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - name: Build release
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/target/${{ matrix.target }}/release/xg
