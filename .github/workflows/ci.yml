name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build
        working-directory: rust
        run: cargo build
      - name: Test
        working-directory: rust
        run: cargo test
      - name: Build release
        working-directory: rust
        run: cargo build --release
      - name: Smoke test
        working-directory: rust
        run: |
          echo "hello world" > /tmp/test_xgrep.txt
          cd /tmp
          ./target/release/xgrep 2>/dev/null || true
          cd -
          # Verify binary runs
          ./target/release/xgrep --help

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Clippy
        working-directory: rust
        run: cargo clippy -- -D warnings
      - name: Format check
        working-directory: rust
        run: cargo fmt -- --check

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies
        working-directory: rust
        run: cargo audit
      - name: Check for unsafe code count
        working-directory: rust
        run: |
          UNSAFE_COUNT=$(grep -rn "unsafe" src/ --include="*.rs" | grep -v "SAFETY" | grep -v "#\[cfg" | grep -v "test" | grep -v "mod tests" | wc -l | tr -d ' ')
          echo "Unsafe blocks (excluding tests and SAFETY-commented): $UNSAFE_COUNT"
          if [ "$UNSAFE_COUNT" -gt 25 ]; then
            echo "WARNING: High number of unsafe blocks ($UNSAFE_COUNT). Review needed."
            exit 1
          fi

  release:
    name: Release build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, lint, security]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: xgrep-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: xgrep-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build release
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/target/${{ matrix.target }}/release/xgrep
