name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: gh release create "$RELEASE_TAG" --draft --generate-notes

  build-release:
    name: Build (${{ matrix.target }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: xg-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: xg-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: xg-x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - name: Build release
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd rust/target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz xg
          mv ${{ matrix.artifact }}.tar.gz ../../../../
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
          ARTIFACT: ${{ matrix.artifact }}
        run: gh release upload "$RELEASE_TAG" "${ARTIFACT}.tar.gz"

  publish-crate:
    name: Publish to crates.io
    needs: [create-release]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Publish
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  publish-release:
    name: Publish Release
    needs: [create-release, build-release]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mark release as non-draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
        run: gh release edit "$RELEASE_TAG" --draft=false --repo "${{ github.repository }}"
